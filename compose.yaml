services:
  postgres:
    container_name: postgres
    hostname: postgres
    image: postgres:17
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME} -d rivenbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: rivenbot
    ports:
      - "5432:5432"
  redis:
    container_name: redis
    hostname: redis
    image: redis:8
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeut: 5s
      retries: 3
    ports:
      - "6379:6379"

